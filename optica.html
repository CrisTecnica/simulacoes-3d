<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Óptica Geométrica</title><link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#00ddff}.structure-item input[type="checkbox"]:checked{background:#00ddff;border-color:#00ddff}#info-name{color:#00ddff}.btn-primary{background:#00ddff;border-color:#00ddff}.btn-primary:hover{background:#33eeff}#opt-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#opt-mode:focus{border-color:#00ddff}#focal-slider{width:100%;margin:4px 0;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#focal-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#00ddff;cursor:pointer}</style>
</head>
<body>
<div id="canvas-container"></div><button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>🔦 Óptica Geométrica</h1><div class="subtitle">Lentes e espelhos</div></div>
<div style="padding:12px 20px 8px;"><select id="opt-mode"><option value="lente">Lente Convexa</option><option value="lentec">Lente Côncava</option><option value="espelho">Espelho Côncavo</option><option value="prisma">Prisma</option></select>
<div style="font-size:10px;color:#8888bb;margin:8px 0 2px">Distância Focal</div><input type="range" id="focal-slider" min="1" max="4" step="0.2" value="2.5"></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="optica.js"></script>
</body>
</html>
