<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação 3D do Sistema Solar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #sidebar-header h1 { color: #f39c12; }
        .structure-item input[type="checkbox"]:checked { background: #f39c12; border-color: #f39c12; }
        #info-name { color: #f39c12; }
        .btn-primary { background: #e67e22; border-color: #e67e22; }
        .btn-primary:hover { background: #f39c12; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <button id="toggle-sidebar" title="Alternar painel">☰</button>

    <aside id="sidebar">
        <div id="sidebar-header">
            <h1>🌌 Sistema Solar</h1>
            <div class="subtitle">Clique em um corpo celeste para detalhes</div>
        </div>
        <div id="structure-list"></div>
        <div id="btn-group"></div>
    </aside>

    <div id="info-panel">
        <div id="info-name"></div>
        <div id="info-description"></div>
        <div id="info-function"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="solar.js"></script>
</body>
</html>
