<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Campo Gravitacional e Órbitas</title>
    <link rel="stylesheet" href="style.css">
    <style>#sidebar-header h1{color:#44dd88}.structure-item input[type="checkbox"]:checked{background:#44dd88;border-color:#44dd88}#info-name{color:#44dd88}.btn-primary{background:#44dd88;border-color:#44dd88}.btn-primary:hover{background:#66ffaa}#cg-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#cg-mode:focus{border-color:#44dd88}</style>
</head>
<body>
<div id="canvas-container"></div>
<button id="toggle-sidebar" title="Alternar painel">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>🌍 Campo Gravitacional</h1><div class="subtitle">Poço gravitacional e órbitas de satélites</div></div>
<div style="padding:12px 20px 8px;"><select id="cg-mode"><option value="orbits">Órbitas de Satélites</option><option value="gravitywell">Poço Gravitacional</option><option value="nbody">Simulação N-Corpos</option></select></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="campograv.js"></script>
</body>
</html>
