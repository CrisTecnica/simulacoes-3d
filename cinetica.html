<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cinética Química</title><link rel="stylesheet" href="style.css"><style>#sidebar-header h1{color:#44ffaa}.structure-item input[type="checkbox"]:checked{background:#44ffaa;border-color:#44ffaa}#info-name{color:#44ffaa}.btn-primary{background:#44ffaa}#temp-cin{width:100%;margin:4px 0;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#temp-cin::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#44ffaa;cursor:pointer}#conc-cin{width:100%;margin:4px 0;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#conc-cin::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#44ffaa;cursor:pointer}</style></head>
<body><div id="canvas-container"></div><button id="toggle-sidebar">☰</button><aside id="sidebar"><div id="sidebar-header"><h1>⚗️ Cinética Química</h1><div class="subtitle">Velocidade de reação</div></div><div style="padding:12px 20px 8px"><div style="font-size:10px;color:#8888bb">Temperatura</div><input type="range" id="temp-cin" min="0.2" max="3" step="0.1" value="1"><div style="font-size:10px;color:#8888bb">Concentração</div><input type="range" id="conc-cin" min="0.2" max="1" step="0.1" value="0.5"><div id="rate-display" style="font-size:10px;color:#88ffaa;text-align:center;margin-top:4px">Taxa: 0</div></div><div id="structure-list"></div><div id="btn-group"></div></aside><div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script><script src="cinetica.js"></script></body></html>
