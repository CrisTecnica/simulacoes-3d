<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Difusão de Moléculas</title><link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#44aaff}.structure-item input[type="checkbox"]:checked{background:#44aaff;border-color:#44aaff}#info-name{color:#44aaff}.btn-primary{background:#44aaff}#dif-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#dif-mode:focus{border-color:#44aaff}#temp-slider{width:100%;margin:4px 0;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#temp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#44aaff;cursor:pointer}</style>
</head>
<body>
<div id="canvas-container"></div><button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>💨 Difusão</h1><div class="subtitle">Difusão de moléculas e osmose</div></div>
<div style="padding:12px 20px 8px;"><select id="dif-mode"><option value="simples">Difusão Simples</option><option value="osmose">Osmose</option><option value="temp">Efeito da Temperatura</option></select>
<div style="font-size:10px;color:#8888bb;margin:6px 0 2px">Temperatura</div><input type="range" id="temp-slider" min="0.2" max="3" step="0.1" value="1">
<div id="part-count" style="font-size:10px;color:#88aaff;text-align:center;margin-top:4px"></div></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="difusao.js"></script>
</body>
</html>
