<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Movimento de Estrelas na Via Láctea</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #sidebar-header h1{color:#4488ff}
        .structure-item input[type="checkbox"]:checked{background:#4488ff;border-color:#4488ff}
        #info-name{color:#4488ff}
        .btn-primary{background:#4488ff;border-color:#4488ff}
        .btn-primary:hover{background:#66aaff}
        #vl-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}
        #vl-mode:focus{border-color:#4488ff}
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <button id="toggle-sidebar" title="Alternar painel">☰</button>
    <aside id="sidebar">
        <div id="sidebar-header"><h1>🌌 Via Láctea</h1><div class="subtitle">Movimento estelar e estrutura galáctica</div></div>
        <div style="padding:12px 20px 8px;"><select id="vl-mode"><option value="rotation">Rotação Diferencial</option><option value="proper">Movimento Próprio</option><option value="cluster">Aglomerados Globulares</option></select></div>
        <div id="structure-list"></div>
        <div id="btn-group"></div>
    </aside>
    <div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="vialactea.js"></script>
</body>
</html>
