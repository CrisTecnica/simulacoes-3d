<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Colisões entre Partículas</title>
<link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#ff6644}.structure-item input[type="checkbox"]:checked{background:#ff6644;border-color:#ff6644}#info-name{color:#ff6644}.btn-primary{background:#ff6644;border-color:#ff6644}.btn-primary:hover{background:#ff8866}#col-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#col-mode:focus{border-color:#ff6644}</style>
</head>
<body>
<div id="canvas-container"></div>
<button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>💥 Colisões</h1><div class="subtitle">Elástica, inelástica e múltiplas partículas</div></div>
<div style="padding:12px 20px 8px;"><select id="col-mode"><option value="elastica">Colisão Elástica</option><option value="inelastic">Colisão Inelástica</option><option value="multi">Múltiplas Partículas</option></select></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="colisoes.js"></script>
</body>
</html>
