<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ligações Químicas e Geometria Molecular</title><link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#88ddff}.structure-item input[type="checkbox"]:checked{background:#88ddff;border-color:#88ddff}#info-name{color:#88ddff}.btn-primary{background:#88ddff}#lig-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#lig-mode:focus{border-color:#88ddff}</style>
</head>
<body>
<div id="canvas-container"></div><button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>⚗️ Ligações Químicas</h1><div class="subtitle">Geometria molecular e orbitais</div></div>
<div style="padding:12px 20px 8px;"><select id="lig-mode"><option value="ionica">Iônica (NaCl)</option><option value="covalente">Covalente (H₂O)</option><option value="metalica">Metálica</option><option value="hidrogenio">Pontes de Hidrogênio</option></select></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="ligacoes.js"></script>
</body>
</html>
