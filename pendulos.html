<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pêndulo Simples e Duplo</title>
<link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#44ccff}.structure-item input[type="checkbox"]:checked{background:#44ccff;border-color:#44ccff}#info-name{color:#44ccff}.btn-primary{background:#44ccff;border-color:#44ccff}.btn-primary:hover{background:#66ddff}#pd-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#pd-mode:focus{border-color:#44ccff}</style>
</head>
<body>
<div id="canvas-container"></div>
<button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>⏱️ Pêndulos</h1><div class="subtitle">Pêndulo simples, duplo e triplo</div></div>
<div style="padding:12px 20px 8px;"><select id="pd-mode"><option value="simple">Pêndulo Simples</option><option value="double">Pêndulo Duplo</option><option value="triple">Pêndulo Triplo</option></select></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="pendulos.js"></script>
</body>
</html>
