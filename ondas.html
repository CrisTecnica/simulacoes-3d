<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Interferência de Ondas</title>
<link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#00ccff}.structure-item input[type="checkbox"]:checked{background:#00ccff;border-color:#00ccff}#info-name{color:#00ccff}.btn-primary{background:#00ccff;border-color:#00ccff}.btn-primary:hover{background:#33ddff}#ond-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#ond-mode:focus{border-color:#00ccff}#freq-slider,#wl-slider{width:100%;margin:4px 0 8px;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#freq-slider::-webkit-slider-thumb,#wl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#00ccff;cursor:pointer}</style>
</head>
<body>
<div id="canvas-container"></div>
<button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>🌊 Interferência de Ondas</h1><div class="subtitle">Fontes coerentes e padrões de interferência</div></div>
<div style="padding:12px 20px 8px;">
<select id="ond-mode"><option value="duas">Duas Fontes</option><option value="unica">Fonte Única</option><option value="fenda">Fenda Dupla</option><option value="multi">Múltiplas Fontes</option></select>
<div style="font-size:10px;color:#8888bb;margin:8px 0 2px">Frequência</div><input type="range" id="freq-slider" min="0.5" max="3" step="0.1" value="1">
<div style="font-size:10px;color:#8888bb;margin:4px 0 2px">Comprimento de Onda</div><input type="range" id="wl-slider" min="0.3" max="1.5" step="0.1" value="0.8">
</div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="ondas.js"></script>
</body>
</html>
