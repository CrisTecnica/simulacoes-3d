<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Decaimento Radioativo</title><link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#44ff88}.structure-item input[type="checkbox"]:checked{background:#44ff88;border-color:#44ff88}#info-name{color:#44ff88}.btn-primary{background:#44ff88;border-color:#44ff88}.btn-primary:hover{background:#66ffaa}#dec-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#dec-mode:focus{border-color:#44ff88}#meia-vida{width:100%;margin:4px 0;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-color);outline:none}#meia-vida::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#44ff88;cursor:pointer}</style>
</head>
<body>
<div id="canvas-container"></div><button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>☢️ Decaimento Radioativo</h1><div class="subtitle">Simulação estatística de decaimento nuclear</div></div>
<div style="padding:12px 20px 8px;">
<select id="dec-mode"><option value="alfa">Decaimento Alfa</option><option value="beta">Decaimento Beta</option><option value="gama">Decaimento Gama</option><option value="cadeia">Cadeia de Decaimento</option></select>
<div style="font-size:10px;color:#8888bb;margin:8px 0 2px">Meia-vida</div><input type="range" id="meia-vida" min="1" max="10" step="0.5" value="5">
<div id="stats" style="font-size:11px;color:#88ffaa;margin-top:6px;text-align:center"></div>
</div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="decaimento.js"></script>
</body>
</html>
