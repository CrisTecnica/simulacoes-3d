<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Galáxias: Formação e Colisão</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #sidebar-header h1{color:#7c4dff}
        .structure-item input[type="checkbox"]:checked{background:#7c4dff;border-color:#7c4dff}
        #info-name{color:#7c4dff}
        .btn-primary{background:#7c4dff;border-color:#7c4dff}
        .btn-primary:hover{background:#9c6dff}
        #gal-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}
        #gal-mode:focus{border-color:#7c4dff}
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <button id="toggle-sidebar" title="Alternar painel">☰</button>
    <aside id="sidebar">
        <div id="sidebar-header"><h1>🌀 Galáxias</h1><div class="subtitle">Formação e colisão de galáxias</div></div>
        <div style="padding:12px 20px 8px;"><select id="gal-mode"><option value="single">Galáxia Única</option><option value="collide">Colisão Dupla</option><option value="group">Grupo de Galáxias</option></select></div>
        <div id="structure-list"></div>
        <div id="btn-group"></div>
    </aside>
    <div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="galaxias.js"></script>
</body>
</html>
