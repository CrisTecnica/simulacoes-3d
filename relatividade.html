<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Relatividade Especial</title><link rel="stylesheet" href="style.css">
<style>#sidebar-header h1{color:#aa44ff}.structure-item input[type="checkbox"]:checked{background:#aa44ff;border-color:#aa44ff}#info-name{color:#aa44ff}.btn-primary{background:#aa44ff;border-color:#aa44ff}#rel-mode{width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:12px;cursor:pointer;margin-bottom:8px}#rel-mode:focus{border-color:#aa44ff}</style>
</head>
<body>
<div id="canvas-container"></div><button id="toggle-sidebar">☰</button>
<aside id="sidebar">
<div id="sidebar-header"><h1>⚡ Relatividade</h1><div class="subtitle">Dilatação temporal e contração de Lorentz</div></div>
<div style="padding:12px 20px 8px;"><select id="rel-mode"><option value="lorentz">Contração de Lorentz</option><option value="time">Dilatação Temporal</option><option value="light">Cono de Luz</option></select></div>
<div id="structure-list"></div>
<div id="btn-group"></div>
</aside>
<div id="info-panel"><div id="info-name"></div><div id="info-description"></div><div id="info-function"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="relatividade.js"></script>
</body>
</html>
