<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Circulatório Humano</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #speed-controls {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 16px; border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap;
        }
        #speed-controls span { margin-right: 4px; }
        #speed-controls button {
            padding: 4px 10px; border: 1px solid var(--border-color);
            border-radius: 4px; background: transparent; color: var(--text-secondary);
            cursor: pointer; font-size: 11px; transition: all 0.15s;
        }
        #speed-controls button:hover { border-color: var(--accent); color: var(--text-primary); }
        #speed-controls button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <button id="toggle-sidebar" title="Alternar painel">☰</button>
    <aside id="sidebar">
        <div id="sidebar-header">
            <h1>Sistema Circulatório</h1>
            <div class="subtitle">Clique em uma estrutura para detalhes</div>
        </div>
        <div id="speed-controls">
            <span>Velocidade:</span>
            <button data-speed="0.5">0.5×</button>
            <button data-speed="1" class="active">1×</button>
            <button data-speed="3">3×</button>
            <button data-speed="10">10×</button>
        </div>
        <div id="structure-list"></div>
        <div id="btn-group"></div>
    </aside>
    <div id="info-panel">
        <div id="info-name"></div>
        <div id="info-description"></div>
        <div id="info-function"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="circulatorio.js"></script>
</body>
</html>
